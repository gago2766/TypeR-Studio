name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: جلب كود المشروع
      uses: actions/checkout@v4

    - name: تجهيز بيئة العمل
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: تثبيت الملفات وبناء الموقع
      run: |
        npm install
        npm run build

    - name: تحويل الموقع إلى أندرويد
      run: |
        # نعتمد على الحزم المثبتة تلقائياً من package.json دون إعادة تثبيتها يدوياً
        # نستخدم "|| true" لضمان عدم توقف البناء السحابي إذا كان مجلد الأندرويد مضافاً مسبقاً
        npx cap add android || true
        npx cap sync android

    - name: تجهيز الجافا للأندرويد
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: استخراج ملف APK
      run: |
        # حل مشكلة تعارض وتكرار مكتبات Kotlin تلقائياً لمنع فشل البناء
        echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } }" >> android/app/build.gradle
        
        cd android
        chmod +x gradlew
        ./gradlew clean # 👈 تنظيف الكاش لضمان جلب ملفات الويب المصلحة والجديدة بالكامل
        ./gradlew assembleDebug

    - name: رفع التطبيق للتحميل
      uses: actions/upload-artifact@v4
      with:
        name: TypeR-Studio-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
