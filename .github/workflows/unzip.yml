name: Unzip and Move to Root

on:
  workflow_dispatch: # تشغيل يدوي من الهاتف

jobs:
  extract-and-move:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Unzip and move files
        run: |
          # 1. فك ضغط الملف
          unzip -o TypeR-Studio-main.zip
          
          # 2. نقل محتويات المجلد الناتج (غالباً يكون اسمه TypeR-Studio-main) إلى الخارج
          if [ -d "TypeR-Studio-main" ]; then
            echo "نقل الملفات إلى المجلد الرئيسي..."
            mv TypeR-Studio-main/* . 2>/dev/null || true
            mv TypeR-Studio-main/.* . 2>/dev/null || true # لنقل الملفات المخفية إن وجدت
            
            # 3. حذف المجلد بعد تفريغه لحفظ النظافة
            rm -rf TypeR-Studio-main
          fi

          # 4. اختياري: حذف ملف الـ zip الأصلي حتى لا يستهلك مساحة
          rm -f TypeR-Studio-main.zip

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Extract files directly to root" || echo "No changes to commit"
          git push
