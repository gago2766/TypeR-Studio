name: Unzip File

on:
  workflow_dispatch: # يتيح لك تشغيل العملية يدوياً من الهاتف

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Unzip the file
        run: |
          # استبدل 'archive.zip' باسم ملفك المضغوط
          # استبدل 'extracted_folder' باسم المجلد الذي تريد استخراج الملفات إليه
          unzip -o archive.zip -d extracted_folder

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Extract zip file contents" || echo "No changes to commit"
          git push
