name: Unzip File

on:
  workflow_dispatch: # يتيح لك تشغيل العملية يدوياً من الهاتف

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Unzip the file
        run: |
          # فك ضغط الملف المحدد إلى مجلد باسم TypeR-Studio-extracted
          unzip -o TypeR-Studio-main.zip -d TypeR-Studio-extracted

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Extract TypeR-Studio-main.zip contents" || echo "No changes to commit"
          git push
