name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: جلب كود المشروع
      uses: actions/checkout@v4

    - name: تجهيز بيئة العمل
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: تثبيت الملفات وبناء الموقع
      run: |
        npm install
        npm run build

    - name: تحويل الموقع إلى أندرويد
      run: |
        # إضافة حزمة @capacitor/share هنا ليتم تثبيتها تلقائياً داخل سير العمل السحابي
        npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/share
        npx cap init "TypeR Studio" "com.typer.studio" --web-dir dist
        npx cap add android
        npx cap sync android

    - name: تجهيز الجافا للأندرويد
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: استخراج ملف APK
      run: |
        # حل مشكلة تعارض وتكرار مكتبات Kotlin تلقائياً لمنع فشل البناء
        echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'; force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22' } }" >> android/app/build.gradle
        
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: رفع التطبيق للتحميل
      uses: actions/upload-artifact@v4
      with:
        name: TypeR-Studio-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
