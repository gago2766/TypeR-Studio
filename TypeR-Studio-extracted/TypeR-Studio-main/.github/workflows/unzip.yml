name: Unzip Project

on:
  push:
    paths:
      - '*.zip'
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: جلب ملفات المشروع
        uses: actions/checkout@v4

      - name: فك الضغط وترتيب الملفات
        run: |
          # البحث عن ملف الـ zip
          ZIP_FILE=$(ls *.zip | head -n 1)
          if [ -f "$ZIP_FILE" ]; then
            echo "تم العثور على $ZIP_FILE، جاري فك الضغط..."
            unzip -q "$ZIP_FILE" -d extracted_temp
            rm "$ZIP_FILE"
            
            # ترتيب الملفات (سواء ضغطت المجلد أو الملفات داخله)
            FOLDER_COUNT=$(ls -1q extracted_temp | wc -l)
            if [ "$FOLDER_COUNT" -eq 1 ] && [ -d "extracted_temp/$(ls -1q extracted_temp)" ]; then
              mv extracted_temp/*/* .
            else
              mv extracted_temp/* .
            fi
            rm -rf extracted_temp
          else
            echo "لم يتم العثور على ملف zip"
            exit 1
          fi

      - name: حفظ الملفات المستخرجة
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "فك ضغط ملفات المشروع تلقائياً 📦" || echo "لا توجد تغييرات"
          git push
